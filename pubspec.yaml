name: creative_clock
description: Auto-launch landscape digital clock when charging

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  battery_plus: ^7.0.0
  sensors_plus: ^7.0.0
  wakelock_plus: ^1.2.8
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  home_widget: ^0.9.0
  screen_brightness: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
